name: Scheduled Data Auto-Update

# 毎日 朝6時 (UTC 21:00 = JST 6:00) 自動実行
# 1. 最新ニュースをRSSから取得 → data/posts.json 更新
# 2. 価格を更新 → data/spikes.json 更新
# 3. データ検証
# 4. 変更があればコミット & プッシュ (Vercelが再デプロイ)
#
# ※ SNS自動投稿は Vercel Cron (/api/cron/post-sns) に移行済み。
#   二重投稿防止のため、このワークフローはデータ更新のみを担当する。

on:
  schedule:
    - cron: "0 21 * * *"   # 毎日 JST 06:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-and-post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Fetch latest news
        run: npx tsx scripts/fetch-news.ts

      - name: Update prices
        run: npx tsx scripts/update-prices.ts

      - name: Validate data
        run: npx tsx scripts/validate-data.ts

      # データの自動コミット & プッシュ → Vercelが再デプロイ。
      # ※ このステップが失敗する場合、原因はほぼGitHubの権限設定:
      #   Settings → Actions → General → Workflow permissions を
      #   「Read and write permissions」に変更すれば解消する。
      #   (mainにブランチ保護がある場合はそちらも要確認)
      - name: Commit data changes
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/spikes.json data/posts.json
          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No data changes"
          else
            git commit -m "chore(data): auto-update news & prices [skip ci]"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
