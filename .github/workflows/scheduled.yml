name: Scheduled Auto-Update & SNS Post

# 毎日 朝6時 (UTC 21:00 = JST 6:00) 自動実行
# 1. 最新ニュースをRSSから取得 → data/posts.json 更新
# 2. 価格を更新 → data/spikes.json 更新
# 3. データ検証
# 4. 変更があればコミット & プッシュ (Vercel等が再デプロイ)
# 5. SNS自動投稿 (X / Instagram)

on:
  schedule:
    - cron: "0 21 * * *"   # 毎日 JST 06:00
  workflow_dispatch:
    inputs:
      skip_post:
        description: "SNS投稿をスキップ"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  update-and-post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Fetch latest news
        run: npx tsx scripts/fetch-news.ts

      - name: Update prices
        run: npx tsx scripts/update-prices.ts

      - name: Validate data
        run: npx tsx scripts/validate-data.ts

      - name: Commit data changes
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/spikes.json data/posts.json
          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No data changes"
          else
            git commit -m "chore(data): auto-update news & prices [skip ci]"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Post to SNS
        if: ${{ inputs.skip_post != true }}
        env:
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_BUSINESS_ID: ${{ secrets.INSTAGRAM_BUSINESS_ID }}
        run: npx tsx scripts/post-sns.ts
